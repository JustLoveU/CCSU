name: Shinagawa Reservation Check

on:
  schedule:
    - cron: "0 1,4,9,13 * * *"   # ✅ 每天JST10:00 / 13:00 / 18:00 / 22:00
  workflow_dispatch:         # ✅ 手动点按钮运行

jobs:
  run:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        area: [大崎, 荏原]
        
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        env:
          SHINAGAWA_USER_ID: ${{ secrets.SHINAGAWA_USER_ID }}
          SHINAGAWA_PASSWORD: ${{ secrets.SHINAGAWA_PASSWORD }}

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

        run: |
          python check_shinagawa.py \
            --start-date $(date +%Y-%m-%d) \
            --area "${{ matrix.area }}" \
            --activity バド \
            --period-days 31 \
            --date-mode 4 \
            --weekdays 6,7,9 \
            --apply-num 15 \
            --mail-to tl2019@yahoo.co.jp
